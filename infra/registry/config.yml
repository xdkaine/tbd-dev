version: 0.1
log:
  level: info
  formatter: json

storage:
  filesystem:
    rootdirectory: /var/lib/registry
  delete:
    enabled: true
  maintenance:
    uploadpurging:
      enabled: true
      age: 168h    # 7 days
      interval: 24h
      dryrun: false
  # GC is run externally via: registry garbage-collect /etc/docker/registry/config.yml
  # Schedule weekly via cron on the host.

auth:
  htpasswd:
    realm: "TBD Registry"
    path: /auth/htpasswd

http:
  addr: :5000
  headers:
    X-Content-Type-Options: [nosniff]

health:
  storagedriver:
    enabled: true
    interval: 30s
    threshold: 3
