# Prometheus configuration for TBD Platform
# Scrapes metrics from platform services and (in production) LXC containers

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Rule files (alerting rules can be added here)
rule_files:
  - "alerts.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape TBD API service
  - job_name: "tbd-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "tbd-api"
          plane: "control"

  # Scrape Nginx
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]
        labels:
          service: "nginx"
          plane: "runtime"

  # Scrape Loki
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
          plane: "runtime"

  # Scrape PostgreSQL (via postgres_exporter if added)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # In production, Proxmox node exporters would be added here:
  # - job_name: "proxmox-nodes"
  #   static_configs:
  #     - targets: ["pve1:9100", "pve2:9100"]
  #       labels:
  #         plane: "runtime"

  # In production, LXC container targets are discovered dynamically.
  # Use file_sd_configs with a JSON file updated by the deploy executor:
  # - job_name: "tbd-apps"
  #   file_sd_configs:
  #     - files:
  #         - "/etc/prometheus/targets/tbd-apps.json"
  #       refresh_interval: 30s
