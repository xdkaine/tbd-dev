worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 500m;

    # Resolver for dynamic upstreams (Docker internal DNS)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---------- SSL settings (shared by all server blocks) ----------
    ssl_certificate     /etc/nginx/ssl/tbd.crt;
    ssl_certificate_key /etc/nginx/ssl/tbd.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---------- HTTP -> HTTPS redirect (all hosts) ----------
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---------- Platform UI: dev.sdc.cpp ----------
    server {
        listen 443 ssl;
        server_name dev.sdc.cpp;

        # API reverse proxy — same origin, no CORS needed.
        # /api/auth/login -> http://tbd-api:8000/auth/login
        location /api/ {
            proxy_pass http://tbd-api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://tbd-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---------- Platform API: api.dev.sdc.cpp ----------
    server {
        listen 443 ssl;
        server_name api.dev.sdc.cpp;

        location / {
            proxy_pass http://tbd-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---------- Registry: registry.dev.sdc.cpp ----------
    server {
        listen 443 ssl;
        server_name registry.dev.sdc.cpp;

        client_max_body_size 0;

        location / {
            proxy_pass http://tbd-registry:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---------- Per-deploy upstream configs ----------
    # Each deploy generates a .conf file with its own upstream + server block.
    # These are written by the API to the shared volume at conf.d/upstreams/.
    include /etc/nginx/conf.d/upstreams/*.conf;

    # ---------- Deploy catch-all: <8-hex>-<user>.dev.sdc.cpp ----------
    # Matches valid deploy hostnames (8 hex chars + username) not yet
    # handled by a per-deploy server block.  Shows a provisioning page
    # that auto-refreshes until the deploy is ready.
    server {
        listen 443 ssl;
        server_name ~^[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]-[a-z0-9][a-z0-9-]*\.dev\.sdc\.cpp$;

        location /health {
            return 503 '{"status": "not_ready", "error": "Deploy routing not yet configured"}';
            add_header Content-Type application/json always;
        }

        location / {
            default_type text/html;
            return 503 '<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deploying - TBD Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#ededed}
.container{text-align:center;max-width:480px;padding:2rem}
.spinner{width:48px;height:48px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 2rem}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:1.5rem;font-weight:600;margin-bottom:.75rem}
p{color:#888;font-size:.95rem;line-height:1.5}
.badge{display:inline-block;margin-top:1.5rem;padding:.35rem .75rem;border:1px solid #333;border-radius:6px;font-size:.8rem;color:#666;letter-spacing:.03em}
</style>
<meta http-equiv="refresh" content="10">
</head>
<body>
<div class="container">
<div class="spinner"></div>
<h1>Deployment in progress</h1>
<p>This project is being built and deployed. This page will automatically refresh.</p>
<span class="badge">TBD Platform</span>
</div>
</body>
</html>';
        }
    }

    # ---------- Default HTTPS catch-all ----------
    # Anything that doesn't match a known host or valid deploy pattern.
    server {
        listen 443 ssl default_server;
        server_name _;

        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json always;
        }

        location / {
            default_type text/html;
            return 404 '<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Not Found - TBD Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#ededed}
.container{text-align:center;max-width:480px;padding:2rem}
h1{font-size:1.5rem;font-weight:600;margin-bottom:.75rem}
p{color:#888;font-size:.95rem;line-height:1.5;margin-bottom:1.5rem}
a{color:#fff;text-decoration:none;padding:.5rem 1.25rem;border:1px solid #333;border-radius:6px;font-size:.9rem;transition:border-color .2s}
a:hover{border-color:#888}
.badge{display:inline-block;margin-top:2rem;padding:.35rem .75rem;border:1px solid #333;border-radius:6px;font-size:.8rem;color:#666;letter-spacing:.03em}
</style>
<meta http-equiv="refresh" content="5;url=https://dev.sdc.cpp">
</head>
<body>
<div class="container">
<h1>Deployment not found</h1>
<p>This deployment does not exist or has been removed.</p>
<a href="https://dev.sdc.cpp">Go to TBD Platform</a>
<br>
<span class="badge">TBD Platform</span>
</div>
</body>
</html>';
        }
    }
}
