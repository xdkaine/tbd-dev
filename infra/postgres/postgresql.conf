# TBD Platform — PostgreSQL tuning for 32GB RAM / 16 cores
# Mount this as a custom config override in the postgres container.

# Memory — allocate ~25% of RAM to shared_buffers
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 64MB
maintenance_work_mem = 1GB

# WAL / Checkpoints
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# Parallelism — use those 16 cores
max_worker_processes = 16
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Connections
max_connections = 200

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging (minimal overhead)
log_min_duration_statement = 500
log_checkpoints = on
log_connections = off
log_disconnections = off
